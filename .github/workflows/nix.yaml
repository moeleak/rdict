name: Nix check

permissions: {}

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - master

jobs:
  nix_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@526118121621777ccd86f79b04685a9319637641
      - run: nix flake check
      - run: nix build --print-build-logs
